<div id="page-title-parent"{% if include.hero_class %} class="{{ include.hero_class }}"{% endif %}>
  <img alt="unfurl" id="header-background-image-resource" rel="preload" src="{{ include.image | relative_url }}" />
  <div id="page-title-gradient"></div>
  <div id="page-title">
    <h1>{{ include.title }}</h1>
    {% if include.subtitle %}<p>{{ include.subtitle }}</p>{% endif %}
  </div>
</div>
