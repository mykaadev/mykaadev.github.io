title: Micael Silva
email: micaelsilva.desk@gmail.com
description: >-
  Hi, I'm Micael Silva aka mykaa.
  I'm a Tools Programmer working at Saber Interactive with 4 years of experience and technical knowledge in game programming, tools development and user experience.
  I'm game design enthusiast and a passionate learner, always exploring new ideas.
baseurl: ""
url: "https://mykaadev.github.io"
twitter_username: mykaadev
github_username: mykaadev

theme:
plugins:
  - jekyll-feed

include:
  - _generated

exclude:
  - README.md
  - scripts
  - content/articles/_README.md
  - content/articles/_articleTemplate.md
  - .bundle
  - vendor
  - _site
  - .jekyll-cache

defaults:
  - scope:
      path: "content/articles"
      type: "pages"
    values:
      layout: default
      nav: articles
      show_contact: false
      hero_subtitle: Notes, breakdowns, and development logs.
      permalink: /articles/:basename/
      discussion: true
      discussion_heading: Discuss this article
      discussion_description: Questions, feedback, and ideas are welcome.
      discussion_mapping: pathname
plugin_sync:
  enabled: true
  github_user: mykaadev
  include_topics:
    - unreal-plugin
    - ue-plugin
    - mykaa-plugin
    - nightshift-plugin
  include_repo_prefixes:
    - Ns
  allow_prefix_fallback: true
  include_repos: []
  exclude_repos: []
  include_archived: false
  default_category: Utility
  default_thumbnail: /resources/images/plugins/UtilityAI.png
  generated_pages_dir: _generated/plugins
  generated_readmes_dir: _includes/generated/readmes
  readme_include_dir: generated/readmes
  download_footer: true
  cleanup_when_empty: false
  category_by_topic:
    algorithm: Algorithm
    gameplay: Gameplay
    tools: Tools
    utility: Utility
    visuals: Visuals
  repo_overrides:
    NsSpyglass:
      category: Utility
    NsSynapse:
      category: Algorithm
    NsTween:
      category: Visuals
  discussions:
    enabled: true
    category: General
    mapping: specific
    term_prefix: plugin-
    repo_overrides: {}

giscus:
  enabled: true
  configured: true
  repo: mykaadev/mykaadev.github.io
  repo_id: "R_kgDOHvxdlQ"
  category: General
  category_id: "DIC_kwDOHvxdlc4C36IY"
  mapping: pathname
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: top
  theme: noborder_gray
  lang: en
  loading: lazy
